<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Playta — Join Match</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   PLAYTA — JOIN MATCH / SLOT BOOKING
   Reuses the app's dark/neon (lime → cyan)
   token system, same as admin.html.
   ═══════════════════════════════════════════ */
:root {
  --bg-0: #0f0f0f;
  --bg-1: #161616;
  --bg-card: #181818;
  --border: rgba(255,255,255,0.08);
  --border-soft: rgba(255,255,255,0.05);

  --text-0: #f5f5f5;
  --text-1: #a8a8a8;
  --text-2: #6e6e6e;

  --lime: #39ff14;
  --cyan: #00ffff;
  --grad: linear-gradient(135deg, var(--lime), var(--cyan));

  --danger: #ff4d6d;
  --warn: #ffb020;

  --radius-lg: 20px;
  --radius-md: 14px;
  --radius-sm: 10px;

  --font-display: 'Orbitron', sans-serif;
  --font-body: 'Rajdhani', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg-0);
  color: var(--text-0);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 0; height: 0; }
button:focus-visible, input:focus-visible {
  outline: 2px solid var(--cyan);
  outline-offset: 2px;
}

.wrapper {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  padding-bottom: 40px;
}

/* ═══════════ HEADER ═══════════ */
.jm-header {
  position: sticky;
  top: 0;
  z-index: 50;
  padding: 18px 18px 14px;
  background: rgba(15,15,15,0.9);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border-soft);
}
.jm-title-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 8px;
}
.jm-title {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 800;
  letter-spacing: 0.03em;
}
.jm-title span {
  background: var(--grad);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.jm-slots-count {
  font-size: 11px;
  font-weight: 700;
  color: var(--cyan);
  background: rgba(0,255,255,0.1);
  border-radius: 999px;
  padding: 3px 10px;
  white-space: nowrap;
}
.jm-sub-row { display: flex; align-items: center; gap: 8px; }
.jm-fee-text { font-size: 12px; color: var(--text-2); font-weight: 600; }

/* Match type badge — same classes/colors as admin.html so the
   colour language stays identical across the whole app. */
.match-type-badge {
  flex-shrink: 0;
  font-size: 9.5px;
  font-weight: 800;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  border-radius: 999px;
  padding: 3px 9px;
}
.match-type-badge.type-solo  { color: var(--cyan); background: rgba(0,255,255,0.12); }
.match-type-badge.type-duo   { color: var(--warn); background: rgba(255,176,32,0.12); }
.match-type-badge.type-squad { color: var(--lime); background: rgba(57,255,20,0.12); }

/* ═══════════ DEMO / PREVIEW CONTROLS ═══════════
   Not part of the real UI — lets you preview all
   3 match types in one file. Remove this box when
   wiring the module into the real app. */
.demo-box {
  margin: 14px 18px;
  padding: 12px 14px;
  border: 1px dashed var(--border);
  border-radius: var(--radius-md);
}
.demo-box-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text-2);
  margin-bottom: 10px;
}
.demo-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.demo-pill {
  padding: 7px 14px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--bg-1);
  color: var(--text-1);
  font-family: var(--font-body);
  font-size: 12.5px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s ease;
}
.demo-pill.active { background: var(--grad); color: #08120a; border-color: transparent; }
.demo-fee-wrap { display: flex; align-items: center; gap: 6px; margin-left: auto; }
.demo-fee-label { font-size: 11px; color: var(--text-2); font-weight: 600; }
.demo-fee-input {
  width: 60px;
  padding: 6px 8px;
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-0);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 700;
}

/* ═══════════ SOLO GRID (48 individual slots) ═══════════ */
.solo-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  padding: 4px 18px 18px;
}
.solo-slot {
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  cursor: pointer;
  transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
}
.solo-slot:active:not(:disabled) { transform: scale(0.94); }
.solo-slot-num { font-family: var(--font-display); font-size: 12px; font-weight: 700; color: var(--text-0); }
.solo-slot-label { font-size: 9px; font-weight: 700; letter-spacing: 0.03em; text-transform: uppercase; color: var(--cyan); }
.solo-slot.booked {
  border-color: rgba(57,255,20,0.3);
  background: rgba(57,255,20,0.06);
  cursor: not-allowed;
}
.solo-slot.booked .solo-slot-num { color: var(--text-1); }
.solo-slot.booked .solo-slot-label { color: var(--lime); }

/* ═══════════ TEAM GRID (Duo / Squad — 12 team slots) ═══════════ */
.team-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 4px 18px 18px;
}
.team-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 116px;
}
.team-card-label {
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 700;
  color: var(--text-1);
  letter-spacing: 0.02em;
}
.book-team-btn {
  margin-top: auto;
  padding: 9px;
  border: 1px dashed rgba(0,255,255,0.35);
  border-radius: var(--radius-sm);
  background: rgba(0,255,255,0.05);
  color: var(--cyan);
  font-family: var(--font-body);
  font-size: 12.5px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s ease, filter 0.15s ease;
}
.book-team-btn:active { transform: scale(0.96); filter: brightness(1.2); }

.team-card.booked { border-color: rgba(57,255,20,0.3); background: rgba(57,255,20,0.04); }
.team-booked-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 9.5px;
  font-weight: 800;
  color: var(--lime);
  background: rgba(57,255,20,0.12);
  border-radius: 999px;
  padding: 3px 8px;
  width: fit-content;
}
.team-booked-name {
  font-size: 13.5px;
  font-weight: 700;
  color: var(--text-0);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.team-booked-roster { font-size: 11px; color: var(--text-2); font-weight: 600; margin-top: auto; }

/* ═══════════ BOOKING MODAL (bottom sheet) ═══════════ */
.booking-overlay {
  display: flex;
  position: fixed;
  inset: 0;
  z-index: 600;
  background: rgba(0,0,0,0.6);
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
}
.booking-overlay.show { opacity: 1; pointer-events: auto; }

.booking-sheet {
  width: 100%;
  max-width: 480px;
  max-height: 86vh;
  overflow-y: auto;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-top-left-radius: 20px;
  border-top-right-radius: 20px;
  padding: 10px 18px 22px;
  transform: translateY(100%);
  transition: transform 0.3s ease;
}
.booking-overlay.show .booking-sheet { transform: translateY(0); }

.booking-drag-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border); margin: 6px auto 14px; }

.booking-header { display: flex; align-items: flex-start; justify-content: space-between; }
.booking-title { font-family: var(--font-display); font-size: 14.5px; font-weight: 800; }
.booking-subtitle { font-size: 11.5px; color: var(--text-2); font-weight: 600; margin-top: 3px; }
.booking-close-btn {
  width: 30px; height: 30px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg-1);
  color: var(--text-1);
  font-size: 13px;
  cursor: pointer;
  flex-shrink: 0;
}

.booking-section-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--text-2);
  margin: 18px 0 10px;
}

.field { margin-bottom: 14px; }
.field-label {
  display: block;
  font-size: 11.5px;
  font-weight: 600;
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 6px;
}
.field-input {
  width: 100%;
  padding: 12px 14px;
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-0);
  font-family: var(--font-body);
  font-size: 14.5px;
  font-weight: 600;
  outline: none;
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
}
.field-input::placeholder { color: var(--text-2); font-weight: 500; }
.field-input:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,255,255,0.1); }

.player-block { margin-bottom: 12px; }
.player-block-label { font-size: 11px; font-weight: 700; color: var(--text-1); margin-bottom: 6px; }
.player-inputs-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.fee-summary {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg-1);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-sm);
  padding: 13px 14px;
  margin: 16px 0 14px;
}
.fee-summary-label { font-size: 12.5px; color: var(--text-1); font-weight: 600; }
.fee-summary-value { font-family: var(--font-display); font-size: 16px; font-weight: 800; color: var(--lime); }

.confirm-pay-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: var(--radius-sm);
  background: var(--grad);
  color: #08120a;
  font-family: var(--font-body);
  font-size: 14.5px;
  font-weight: 700;
  letter-spacing: 0.02em;
  cursor: pointer;
  transition: transform 0.15s ease, filter 0.15s ease;
}
.confirm-pay-btn:active { transform: scale(0.98); filter: brightness(0.95); }

/* ═══════════ TOAST ═══════════ */
.toast-container {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 999;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
  width: calc(100% - 32px);
  max-width: 480px;
  pointer-events: none;
}
.toast {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #1c1c1c;
  border: 1px solid var(--border);
  border-left: 3px solid var(--lime);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-0);
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.25s ease, transform 0.25s ease;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.error { border-left-color: var(--danger); }
</style>
</head>
<body>

<div class="wrapper">

  <!-- ═══════════ HEADER ═══════════ -->
  <div class="jm-header">
    <div class="jm-title-row">
      <div class="jm-title">Join <span>Match</span></div>
      <div class="jm-slots-count" id="jmSlotsCount">0 / 48 joined</div>
    </div>
    <div class="jm-sub-row">
      <span class="match-type-badge type-squad" id="jmTypeBadge">Squad</span>
      <span class="jm-fee-text" id="jmFeeText">Entry: 20 / player</span>
    </div>
  </div>

  <!-- ═══════════ DEMO CONTROLS (delete on integration) ═══════════ -->
  <div class="demo-box">
    <div class="demo-box-label">Preview controls — not part of the real UI</div>
    <div class="demo-row">
      <button class="demo-pill" data-type="Solo" onclick="setDemoMatchType('Solo')">Solo</button>
      <button class="demo-pill" data-type="Duo" onclick="setDemoMatchType('Duo')">Duo</button>
      <button class="demo-pill active" data-type="Squad" onclick="setDemoMatchType('Squad')">Squad</button>
      <div class="demo-fee-wrap">
        <span class="demo-fee-label">Fee/player</span>
        <input type="number" id="demoFeeInput" class="demo-fee-input" value="20" min="0">
      </div>
    </div>
  </div>

  <!-- ═══════════ SLOT GRIDS (only one shows at a time) ═══════════ -->
  <div id="soloGrid" class="solo-grid"></div>
  <div id="teamGrid" class="team-grid"></div>

</div>

<!-- ═══════════ BOOKING MODAL ═══════════ -->
<div class="booking-overlay" id="bookingOverlay">
  <div class="booking-sheet">
    <div class="booking-drag-handle"></div>

    <div class="booking-header">
      <div>
        <div class="booking-title" id="bookingTitle">Book Team Slot</div>
        <div class="booking-subtitle" id="bookingSubtitle">Team 1 · Squad · 4 players</div>
      </div>
      <button class="booking-close-btn" onclick="closeBookingModal()" aria-label="Close">✕</button>
    </div>

    <div class="booking-section-label">Team Details</div>
    <div class="field">
      <label class="field-label" for="teamNameInput">Team Name</label>
      <input type="text" id="teamNameInput" class="field-input" placeholder="e.g. Alpha Wolves">
    </div>

    <div class="booking-section-label">Player Details</div>
    <div id="playerFieldsContainer"><!-- IGN/UID rows injected per match type --></div>

    <div class="fee-summary">
      <span class="fee-summary-label">Total Entry Fee</span>
      <span class="fee-summary-value" id="feeSummaryValue">₹80</span>
    </div>

    <button class="confirm-pay-btn" id="confirmPayBtn" onclick="confirmBooking()">Confirm & Pay · ₹80</button>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
/* ═══════════════════════════════════════════
   PLAYTA — JOIN MATCH / SLOT BOOKING LOGIC
   ─────────────────────────────────────────
   Solo         → 48 individual slots, 1-tap Join
   Duo / Squad  → 12 Team Slots, booked as a whole
                  via one team-leader modal — no
                  per-member checkboxes, so a team
                  can never be joined half-complete.
   ═══════════════════════════════════════════ */

const TEAM_SIZE = { Solo: 1, Duo: 2, Squad: 4 };

// ── DEMO CONTEXT ─────────────────────────────────────────
// In the real app, currentMatchType/entryFeePerPlayer come from
// the match object the player tapped (the same shape admin.html
// writes into 'upcoming_matches': match.matchType, match.entryFee).
// The demo pills/input just let you preview all 3 states here.
let currentMatchType = 'Squad';
let entryFeePerPlayer = 20;

// ── Slot data (in-memory for this demo — see the INTEGRATION
// NOTES at the bottom of this file for why real bookings must
// live in Firestore instead) ──────────────────────────────
let soloSlots = Array.from({ length: 48 }, (_, i) => ({
  slotNumber: i + 1,
  status: 'open' // 'open' | 'joined'
}));

let teamSlots = Array.from({ length: 12 }, (_, i) => ({
  teamNumber: i + 1,
  status: 'open', // 'open' | 'booked'
  teamName: null,
  roster: []       // [{ ign, uid }, ...]
}));

let activeTeamNumber = null;

// ── Toast ─────────────────────────────────────────────
function showToast(message, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast' + (type === 'error' ? ' error' : '');
  toast.textContent = message;
  container.appendChild(toast);

  requestAnimationFrame(() => {
    requestAnimationFrame(() => toast.classList.add('show'));
  });

  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 300);
  }, 2400);
}

// ── Formatting ────────────────────────────────────────
function formatUnits(n) {
  return (Number(n) || 0).toLocaleString('en-IN');
}
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── Demo controls ─────────────────────────────────────
function setDemoMatchType(type) {
  closeBookingModal();
  currentMatchType = type;
  document.querySelectorAll('.demo-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.type === type);
  });
  renderAll();
}
document.getElementById('demoFeeInput').addEventListener('input', (e) => {
  entryFeePerPlayer = Number(e.target.value) || 0;
  renderAll();
});

// ── Master render ─────────────────────────────────────
function renderAll() {
  const badge = document.getElementById('jmTypeBadge');
  badge.className = 'match-type-badge type-' + currentMatchType.toLowerCase();
  badge.textContent = currentMatchType;
  document.getElementById('jmFeeText').textContent = 'Entry: ' + formatUnits(entryFeePerPlayer) + ' / player';

  const soloGrid = document.getElementById('soloGrid');
  const teamGrid = document.getElementById('teamGrid');

  if (currentMatchType === 'Solo') {
    soloGrid.style.display = 'grid';
    teamGrid.style.display = 'none';
    renderSoloGrid();
  } else {
    soloGrid.style.display = 'none';
    teamGrid.style.display = 'grid';
    renderTeamGrid();
  }
}

// ── SOLO: render + join ────────────────────────────────
function renderSoloGrid() {
  const joined = soloSlots.filter(s => s.status === 'joined').length;
  document.getElementById('jmSlotsCount').textContent = joined + ' / 48 joined';

  document.getElementById('soloGrid').innerHTML = soloSlots.map(slot => `
    <button class="solo-slot ${slot.status === 'joined' ? 'booked' : ''}"
            ${slot.status === 'joined' ? 'disabled' : ''}
            onclick="joinSoloSlot(${slot.slotNumber})">
      <div class="solo-slot-num">#${slot.slotNumber}</div>
      <div class="solo-slot-label">${slot.status === 'joined' ? 'Joined ✓' : 'Join'}</div>
    </button>
  `).join('');
}

function joinSoloSlot(slotNumber) {
  const slot = soloSlots.find(s => s.slotNumber === slotNumber);
  if (!slot || slot.status === 'joined') return;

  // ── PRODUCTION NOTE: run this through a Firestore transaction
  // (check status is still 'open', then write 'joined') instead
  // of a direct assignment — see INTEGRATION NOTES below.
  slot.status = 'joined';

  showToast('Slot #' + slotNumber + ' joined!');
  renderSoloGrid();
}

// ── DUO/SQUAD: render team cards ───────────────────────
function renderTeamGrid() {
  const size = TEAM_SIZE[currentMatchType];
  const booked = teamSlots.filter(t => t.status === 'booked').length;
  document.getElementById('jmSlotsCount').textContent = booked + ' / 12 teams';

  document.getElementById('teamGrid').innerHTML = teamSlots.map(team => {
    if (team.status === 'booked') {
      return `
        <div class="team-card booked">
          <div class="team-card-label">TEAM ${team.teamNumber}</div>
          <div class="team-booked-tag">✓ Booked</div>
          <div class="team-booked-name">${escapeHtml(team.teamName)}</div>
          <div class="team-booked-roster">${team.roster.length}/${size} players</div>
        </div>
      `;
    }
    return `
      <div class="team-card">
        <div class="team-card-label">TEAM ${team.teamNumber}</div>
        <button class="book-team-btn" onclick="openBookingModal(${team.teamNumber})">Book Team Slot</button>
      </div>
    `;
  }).join('');
}

// ── Booking modal ──────────────────────────────────────
function openBookingModal(teamNumber) {
  activeTeamNumber = teamNumber;
  const size = TEAM_SIZE[currentMatchType];
  const total = entryFeePerPlayer * size;

  document.getElementById('bookingSubtitle').textContent =
    'Team ' + teamNumber + ' · ' + currentMatchType + ' · ' + size + ' players';
  document.getElementById('teamNameInput').value = '';

  document.getElementById('playerFieldsContainer').innerHTML = Array.from({ length: size }, (_, i) => `
    <div class="player-block">
      <div class="player-block-label">Player ${i + 1}</div>
      <div class="player-inputs-row">
        <input type="text" id="playerIgn_${i}" class="field-input" placeholder="IGN">
        <input type="text" id="playerUid_${i}" class="field-input" placeholder="UID">
      </div>
    </div>
  `).join('');

  document.getElementById('feeSummaryValue').textContent = '₹' + formatUnits(total);
  document.getElementById('confirmPayBtn').textContent = 'Confirm & Pay · ₹' + formatUnits(total);

  document.getElementById('bookingOverlay').classList.add('show');
}

function closeBookingModal() {
  document.getElementById('bookingOverlay').classList.remove('show');
  activeTeamNumber = null;
}

document.getElementById('bookingOverlay').addEventListener('click', (e) => {
  if (e.target.id === 'bookingOverlay') closeBookingModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeBookingModal();
});

function confirmBooking() {
  if (activeTeamNumber === null) return;
  const size = TEAM_SIZE[currentMatchType];
  const teamName = document.getElementById('teamNameInput').value.trim();

  if (!teamName) {
    showToast('Please enter a team name', 'error');
    return;
  }

  const roster = [];
  for (let i = 0; i < size; i++) {
    const ign = document.getElementById('playerIgn_' + i).value.trim();
    const uid = document.getElementById('playerUid_' + i).value.trim();
    if (!ign || !uid) {
      showToast('Please fill in every player\u2019s IGN & UID', 'error');
      return;
    }
    roster.push({ ign, uid });
  }

  // ── PRODUCTION NOTE ──────────────────────────────────
  // Open Razorpay checkout with `total` here. Only inside the
  // payment success callback should the block below run — if
  // payment fails or the sheet is closed, the slot must stay
  // 'open'. See INTEGRATION NOTES at the bottom of this file.
  const team = teamSlots.find(t => t.teamNumber === activeTeamNumber);
  team.status = 'booked';
  team.teamName = teamName;
  team.roster = roster;

  showToast('Team ' + activeTeamNumber + ' booked!');
  closeBookingModal();
  renderTeamGrid();
}

// ── Init ────────────────────────────────────────────────
renderAll();

/* ═══════════════════════════════════════════════════════════
   INTEGRATION NOTES — read before wiring this into the real app
   ═══════════════════════════════════════════════════════════

   1. SLOT DATA MUST LIVE IN FIRESTORE, NOT localStorage/memory
      ---------------------------------------------------------
      Unlike the admin panel (one admin, one device), slot booking
      is state shared by every player viewing this match at once.
      If it lived in localStorage, Player A's phone and Player B's
      phone would each hold their own private copy of "Team 5 is
      open" — both could book it, and two teams would end up
      thinking they own the same slot.

      Store each match's slots as a Firestore document (e.g.
      matches/{matchId}) and read it with onSnapshot() so every
      open device updates live as slots fill. Wrap the actual
      booking write in a Firestore transaction (runTransaction)
      that re-checks the slot is still 'open' before writing
      'booked' — that check-then-write is what stops two teams
      claiming the same slot in the same second.

   2. WHERE RAZORPAY GOES
      ---------------------------------------------------------
      confirmBooking() / joinSoloSlot() currently mark the slot
      booked immediately. In production: open Razorpay checkout
      with the calculated total → on the payment success callback,
      run the Firestore transaction above → only then update the
      UI. If payment fails or the checkout is closed, the slot
      must stay 'open'.

   3. REPLACING THE DEMO CONTROLS
      ---------------------------------------------------------
      Delete .demo-box and the setDemoMatchType()/fee-input
      wiring. On page load, call this module with the real match
      the player tapped instead:
        currentMatchType  = match.matchType;
        entryFeePerPlayer = match.entryFee;
      — the same fields admin.html already saves per match.

   ═══════════════════════════════════════════════════════════ */
</script>
