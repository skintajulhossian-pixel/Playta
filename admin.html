<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Playta — Admin Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   PLAYTA ADMIN — reuses the app's dark/neon
   (lime → cyan) token system for consistency.
   ═══════════════════════════════════════════ */
:root {
  --bg-0: #0f0f0f;
  --bg-1: #161616;
  --bg-card: #181818;
  --border: rgba(255,255,255,0.08);
  --border-soft: rgba(255,255,255,0.05);

  --text-0: #f5f5f5;
  --text-1: #a8a8a8;
  --text-2: #6e6e6e;

  --lime: #39ff14;
  --cyan: #00ffff;
  --grad: linear-gradient(135deg, var(--lime), var(--cyan));

  --danger: #ff4d6d;
  --warn: #ffb020;

  --radius-lg: 20px;
  --radius-md: 14px;
  --radius-sm: 10px;

  --font-display: 'Orbitron', sans-serif;
  --font-body: 'Rajdhani', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg-0);
  color: var(--text-0);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
}

.wrapper {
  max-width: 520px;
  margin: 0 auto;
  min-height: 100vh;
  padding-bottom: 60px;
}

/* ═══════════ HEADER ═══════════ */
.admin-header {
  position: sticky;
  top: 0;
  z-index: 50;
  padding: 18px 18px 14px;
  background: rgba(15,15,15,0.9);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border-soft);
}
.admin-title {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 800;
  letter-spacing: 0.03em;
}
.admin-title span {
  background: var(--grad);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.admin-sub {
  font-size: 12px;
  color: var(--text-2);
  margin-top: 2px;
}

/* ═══════════ FORM CARD ═══════════ */
.form-section { padding: 18px; }

.form-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px;
}

.form-card-title {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-1);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.form-card-title::before {
  content: "";
  width: 4px;
  height: 14px;
  border-radius: 2px;
  background: var(--grad);
}

.field { margin-bottom: 14px; }
.field:last-of-type { margin-bottom: 0; }

.field-label {
  display: block;
  font-size: 11.5px;
  font-weight: 600;
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 6px;
}

.field-input {
  width: 100%;
  padding: 12px 14px;
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-0);
  font-family: var(--font-body);
  font-size: 14.5px;
  font-weight: 600;
  outline: none;
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
}
.field-input::placeholder { color: var(--text-2); font-weight: 500; }
.field-input:focus {
  border-color: var(--cyan);
  box-shadow: 0 0 0 3px rgba(0,255,255,0.1);
}
.field-input::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.6; }

select.field-input {
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
  background-image: linear-gradient(45deg, transparent 50%, var(--text-1) 50%),
                     linear-gradient(135deg, var(--text-1) 50%, transparent 50%);
  background-position: calc(100% - 18px) calc(1em + 3px), calc(100% - 13px) calc(1em + 3px);
  background-size: 5px 5px, 5px 5px;
  background-repeat: no-repeat;
  padding-right: 36px;
  cursor: pointer;
}
select.field-input option {
  background: var(--bg-1);
  color: var(--text-0);
}

.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.btn-primary {
  width: 100%;
  margin-top: 16px;
  padding: 13px;
  border: none;
  border-radius: var(--radius-sm);
  background: var(--grad);
  color: #08120a;
  font-family: var(--font-body);
  font-size: 14.5px;
  font-weight: 700;
  letter-spacing: 0.02em;
  cursor: pointer;
  transition: transform 0.15s ease, filter 0.15s ease;
}
.btn-primary:active { transform: scale(0.98); filter: brightness(0.95); }

/* ═══════════ MATCH LIST ═══════════ */
.list-section { padding: 4px 18px 18px; }

.list-heading {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.list-heading h2 {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-1);
}
.list-count {
  font-size: 11px;
  font-weight: 700;
  color: var(--cyan);
  background: rgba(0,255,255,0.1);
  border-radius: 999px;
  padding: 3px 9px;
}

.match-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
  margin-bottom: 14px;
}

.match-card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 12px;
}
.match-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-0);
  line-height: 1.25;
}
.match-meta-row {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-top: 5px;
}
.match-datetime {
  font-size: 11.5px;
  color: var(--text-2);
  font-weight: 600;
}
.match-type-badge {
  flex-shrink: 0;
  font-size: 9.5px;
  font-weight: 800;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  border-radius: 999px;
  padding: 2px 8px;
}
.match-type-badge.type-solo {
  color: var(--cyan);
  background: rgba(0,255,255,0.12);
}
.match-type-badge.type-duo {
  color: var(--warn);
  background: rgba(255,176,32,0.12);
}
.match-type-badge.type-squad {
  color: var(--lime);
  background: rgba(57,255,20,0.12);
}
.match-delete-btn {
  flex-shrink: 0;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1px solid rgba(255,77,109,0.3);
  background: rgba(255,77,109,0.08);
  color: var(--danger);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s ease, filter 0.15s ease;
}
.match-delete-btn:active { transform: scale(0.9); filter: brightness(1.3); }

.match-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 14px;
}
.stat-box {
  background: var(--bg-1);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-sm);
  padding: 9px 8px;
  text-align: center;
}
.stat-label {
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 0.03em;
  text-transform: uppercase;
  color: var(--text-2);
  margin-bottom: 4px;
}
.stat-value {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  color: var(--lime);
}
.stat-value.cyan { color: var(--cyan); }

.room-block {
  border-top: 1px dashed var(--border);
  padding-top: 12px;
}
.room-block-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--text-2);
  margin-bottom: 8px;
}
.room-inputs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 10px;
}
.room-input {
  width: 100%;
  padding: 10px 12px;
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-0);
  font-family: var(--font-body);
  font-size: 13.5px;
  font-weight: 600;
  outline: none;
}
.room-input:focus { border-color: var(--lime); }
.room-input::placeholder { color: var(--text-2); }

.btn-update {
  width: 100%;
  padding: 10px;
  border: 1px solid rgba(57,255,20,0.3);
  border-radius: var(--radius-sm);
  background: rgba(57,255,20,0.08);
  color: var(--lime);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.02em;
  cursor: pointer;
  transition: filter 0.15s ease, transform 0.15s ease;
}
.btn-update:active { transform: scale(0.98); filter: brightness(1.15); }

.room-set-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 10.5px;
  font-weight: 700;
  color: var(--lime);
  background: rgba(57,255,20,0.1);
  border-radius: 999px;
  padding: 3px 9px;
  margin-bottom: 8px;
}

/* ═══════════ EMPTY STATE ═══════════ */
.empty-state {
  text-align: center;
  padding: 50px 20px;
  color: var(--text-2);
}
.empty-state-icon {
  font-size: 34px;
  margin-bottom: 12px;
  opacity: 0.5;
}
.empty-state-title {
  font-size: 14.5px;
  font-weight: 700;
  color: var(--text-1);
  margin-bottom: 5px;
}
.empty-state-sub {
  font-size: 12.5px;
  color: var(--text-2);
}

/* ═══════════ TOAST ═══════════ */
.toast-container {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 999;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
  width: calc(100% - 32px);
  max-width: 480px;
  pointer-events: none;
}
.toast {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #1c1c1c;
  border: 1px solid var(--border);
  border-left: 3px solid var(--lime);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-0);
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.25s ease, transform 0.25s ease;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.error { border-left-color: var(--danger); }
</style>
</head>
<body>

<div class="wrapper">

  <!-- ═══════════ HEADER ═══════════ -->
  <div class="admin-header">
    <div class="admin-title">Playta <span>Admin</span></div>
    <div class="admin-sub">Create & manage tournament matches</div>
  </div>

  <!-- ═══════════ CREATE MATCH FORM ═══════════ -->
  <div class="form-section">
    <div class="form-card">
      <div class="form-card-title">New Match</div>

      <div class="field">
        <label class="field-label" for="matchTitle">Match Title</label>
        <input type="text" id="matchTitle" class="field-input" placeholder="e.g. Free Fire Squad Showdown">
      </div>

      <div class="field">
        <label class="field-label" for="matchType">Match Type</label>
        <select id="matchType" class="field-input">
          <option value="Solo">Solo</option>
          <option value="Duo">Duo</option>
          <option value="Squad">Squad</option>
        </select>
      </div>

      <div class="field-row">
        <div class="field">
          <label class="field-label" for="entryFee">Entry Fee</label>
          <input type="number" id="entryFee" class="field-input" placeholder="0" min="0">
        </div>
        <div class="field">
          <label class="field-label" for="prizePool">Total Prize Pool</label>
          <input type="number" id="prizePool" class="field-input" placeholder="0" min="0">
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="perKill">Per Kill Prize</label>
        <input type="number" id="perKill" class="field-input" placeholder="0" min="0">
      </div>

      <div class="field">
        <label class="field-label" for="matchDatetime">Date & Time</label>
        <input type="datetime-local" id="matchDatetime" class="field-input">
      </div>

      <button class="btn-primary" id="createMatchBtn">+ Create Match</button>
    </div>
  </div>

  <!-- ═══════════ MATCH LIST ═══════════ -->
  <div class="list-section">
    <div class="list-heading">
      <h2>Upcoming Matches</h2>
      <span class="list-count" id="matchCount">0</span>
    </div>
    <div id="matchListContainer"></div>
  </div>

</div>

<div class="toast-container" id="toastContainer"></div>

<script>
/* ═══════════════════════════════════════════
   PLAYTA ADMIN — app.js logic
   Storage key: 'upcoming_matches' (array of match objects)
   ═══════════════════════════════════════════ */

const STORAGE_KEY = 'upcoming_matches';

// ─────────── Storage helpers ───────────
function getMatches() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) {
    console.error('Failed to parse upcoming_matches from localStorage:', e);
    return [];
  }
}

function saveMatches(matches) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(matches));
}

function generateId() {
  return 'match_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
}

// ─────────── Toast ───────────
function showToast(message, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast' + (type === 'error' ? ' error' : '');
  toast.textContent = message;
  container.appendChild(toast);

  // Force reflow so the transition triggers
  requestAnimationFrame(() => {
    requestAnimationFrame(() => toast.classList.add('show'));
  });

  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 300);
  }, 2400);
}

// ─────────── Formatting ───────────
function formatUnits(amount) {
  const n = Number(amount) || 0;
  return n.toLocaleString('en-IN');
}

function formatDateTime(isoString) {
  if (!isoString) return 'Not set';
  const d = new Date(isoString);
  if (isNaN(d.getTime())) return 'Not set';
  return d.toLocaleString('en-IN', {
    day: '2-digit', month: 'short', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}

// ─────────── Create Match ───────────
document.getElementById('createMatchBtn').addEventListener('click', () => {
  const title = document.getElementById('matchTitle').value.trim();
  const matchType = document.getElementById('matchType').value;
  const entryFee = document.getElementById('entryFee').value;
  const prizePool = document.getElementById('prizePool').value;
  const perKill = document.getElementById('perKill').value;
  const datetime = document.getElementById('matchDatetime').value;

  if (!title) {
    showToast('Please enter a match title', 'error');
    return;
  }
  if (entryFee === '' || prizePool === '' || perKill === '') {
    showToast('Please fill in all prize fields', 'error');
    return;
  }
  if (!datetime) {
    showToast('Please select a date & time', 'error');
    return;
  }

  const newMatch = {
    id: generateId(),
    title: title,
    matchType: matchType,
    entryFee: Number(entryFee),
    prizePool: Number(prizePool),
    perKill: Number(perKill),
    datetime: datetime, // ISO-ish string from datetime-local input
    roomId: '',
    roomPassword: '',
    createdAt: new Date().toISOString()
  };

  const matches = getMatches();
  matches.push(newMatch);
  saveMatches(matches);

  // Reset form
  document.getElementById('matchTitle').value = '';
  document.getElementById('matchType').value = 'Solo';
  document.getElementById('entryFee').value = '';
  document.getElementById('prizePool').value = '';
  document.getElementById('perKill').value = '';
  document.getElementById('matchDatetime').value = '';

  showToast('Match created successfully');
  renderMatchList();
});

// ─────────── Update Room ID / Password ───────────
function updateRoomDetails(matchId) {
  const idInput = document.getElementById('roomId_' + matchId);
  const pwInput = document.getElementById('roomPw_' + matchId);
  const roomId = idInput.value.trim();
  const roomPassword = pwInput.value.trim();

  const matches = getMatches();
  const match = matches.find(m => m.id === matchId);
  if (!match) return;

  match.roomId = roomId;
  match.roomPassword = roomPassword;
  saveMatches(matches);

  showToast('Room details updated');
  renderMatchList();
}

// ─────────── Delete Match ───────────
function deleteMatch(matchId) {
  const matches = getMatches().filter(m => m.id !== matchId);
  saveMatches(matches);
  showToast('Match deleted');
  renderMatchList();
}

// ─────────── Render ───────────
function renderMatchList() {
  const matches = getMatches();
  const container = document.getElementById('matchListContainer');
  document.getElementById('matchCount').textContent = matches.length;

  if (matches.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">🎮</div>
        <div class="empty-state-title">No matches yet</div>
        <div class="empty-state-sub">Create your first match using the form above</div>
      </div>
    `;
    return;
  }

  // Newest first
  const sorted = [...matches].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

  container.innerHTML = sorted.map(match => {
    const hasRoom = match.roomId && match.roomPassword;
    // Older matches saved before the Match Type field existed won't have
    // this property — skip the badge instead of guessing a type for them.
    const typeBadge = match.matchType
      ? `<span class="match-type-badge type-${match.matchType.toLowerCase()}">${escapeHtml(match.matchType)}</span>`
      : '';
    return `
      <div class="match-card">
        <div class="match-card-top">
          <div>
            <div class="match-title">${escapeHtml(match.title)}</div>
            <div class="match-meta-row">
              ${typeBadge}
              <span class="match-datetime">${formatDateTime(match.datetime)}</span>
            </div>
          </div>
          <button class="match-delete-btn" onclick="deleteMatch('${match.id}')" aria-label="Delete match">✕</button>
        </div>

        <div class="match-stats">
          <div class="stat-box">
            <div class="stat-label">Entry Fee</div>
            <div class="stat-value cyan">${formatUnits(match.entryFee)}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Prize Pool</div>
            <div class="stat-value">${formatUnits(match.prizePool)}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Per Kill</div>
            <div class="stat-value">${formatUnits(match.perKill)}</div>
          </div>
        </div>

        <div class="room-block">
          <div class="room-block-label">Room Credentials</div>
          ${hasRoom ? '<div class="room-set-badge">● Room details set</div>' : ''}
          <div class="room-inputs">
            <input type="text" id="roomId_${match.id}" class="room-input" placeholder="Room ID" value="${escapeHtml(match.roomId || '')}">
            <input type="text" id="roomPw_${match.id}" class="room-input" placeholder="Room Password" value="${escapeHtml(match.roomPassword || '')}">
          </div>
          <button class="btn-update" onclick="updateRoomDetails('${match.id}')">Update Room Details</button>
        </div>
      </div>
    `;
  }).join('');
}

// Basic HTML-escape to keep admin-entered text from breaking markup
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ─────────── Init ───────────
renderMatchList();

/* ═══════════════════════════════════════════════════════════
   HOW THE MAIN USER-FACING APP READS THIS DATA
   ─────────────────────────────────────────────────────────
   Copy the snippet below into the main app's js/app.js.
   It reads the same 'upcoming_matches' array this admin
   panel writes to, and renders cards into a container with
   id="upcoming-matches-container" (add that div to index.html
   wherever the tournament list should appear).
   ═══════════════════════════════════════════════════════════

function renderUpcomingMatches() {
  const container = document.getElementById('upcoming-matches-container');
  if (!container) return;

  // 1. Read the array the admin panel saved to localStorage.
  let matches = [];
  try {
    matches = JSON.parse(localStorage.getItem('upcoming_matches')) || [];
  } catch (e) {
    console.error('Could not read upcoming_matches:', e);
  }

  // 2. Handle the empty state.
  if (matches.length === 0) {
    container.innerHTML = '<p class="empty-text">No upcoming matches right now. Check back soon!</p>';
    return;
  }

  // 3. Optionally hide matches the admin hasn't published room info for yet,
  //    or sort by soonest datetime — adjust to match app's real rules.
  const sorted = [...matches].sort((a, b) => new Date(a.datetime) - new Date(b.datetime));

  // 4. Render each match into a card. Reuse the app's existing
  //    tournament-card markup/classes here instead of this placeholder.
  container.innerHTML = sorted.map(match => {
    // Older matches saved before Match Type existed won't have this field —
    // skip the badge instead of guessing a type for them.
    const typeBadge = match.matchType
      ? `<span class="match-type-badge type-${match.matchType.toLowerCase()}">${match.matchType}</span>`
      : '';
    return `
      <div class="tournament-card" data-match-id="${match.id}">
        <div class="tournament-card-header">
          <h3>${match.title}</h3>
          ${typeBadge}
        </div>
        <p>Entry: ${match.entryFee} Units · Prize Pool: ${match.prizePool} Units</p>
        <p>Per Kill: ${match.perKill} Units</p>
        <p>${new Date(match.datetime).toLocaleString()}</p>
        <!-- Room ID/Password are intentionally NOT shown here until the
             app's existing 3-state reveal logic unlocks them for the user. -->
      </div>
    `;
  }).join('');
}

// rules live in admin.html's <style> block. Copy those same rules into
