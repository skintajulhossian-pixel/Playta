<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Playta — Join Match</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   PLAYTA — JOIN MATCH / SLOT BOOKING
   Same dark/neon token system as the main app.
   ═══════════════════════════════════════════ */
:root {
  --bg-0: #0f0f0f;
  --bg-1: #161616;
  --bg-card: #181818;
  --border: rgba(255,255,255,0.08);
  --border-soft: rgba(255,255,255,0.05);
  --text-0: #f5f5f5;
  --text-1: #a8a8a8;
  --text-2: #6e6e6e;
  --lime: #39ff14;
  --cyan: #00ffff;
  --grad: linear-gradient(135deg, var(--lime), var(--cyan));
  --danger: #ff4d6d;
  --warn: #ffb020;
  --radius-lg: 20px;
  --radius-md: 14px;
  --radius-sm: 10px;
  --font-display: 'Orbitron', sans-serif;
  --font-body: 'Rajdhani', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg-0);
  color: var(--text-0);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 0; height: 0; }
button:focus-visible, input:focus-visible { outline: 2px solid var(--cyan); outline-offset: 2px; }

.wrapper { max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 40px; }

/* ═══════════ HEADER ═══════════ */
.jm-header {
  position: sticky;
  top: 0;
  z-index: 50;
  padding: 14px 18px;
  background: rgba(15,15,15,0.92);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border-soft);
}
.jm-title-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 6px;
}
.jm-left { display: flex; align-items: center; gap: 10px; }
.jm-back-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-0);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  text-decoration: none;
}
.jm-back-btn .ic { width: 18px; height: 18px; }
.jm-title { font-family: var(--font-display); font-size: 14px; font-weight: 800; letter-spacing: 0.03em; }
.jm-title span { background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent; }
.jm-slots-count { font-size: 11px; font-weight: 700; color: var(--cyan); background: rgba(0,255,255,0.1); border-radius: 999px; padding: 3px 10px; white-space: nowrap; }

.jm-match-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-2);
  margin-bottom: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.jm-sub-row { display: flex; align-items: center; gap: 8px; }
.jm-fee-text { font-size: 12px; color: var(--text-2); font-weight: 600; }

/* Match type badge — cyan/amber/lime per type */
.match-type-badge { flex-shrink: 0; font-size: 9.5px; font-weight: 800; letter-spacing: 0.04em; text-transform: uppercase; border-radius: 999px; padding: 3px 9px; }
.match-type-badge.type-solo  { color: var(--cyan); background: rgba(0,255,255,0.12); }
.match-type-badge.type-duo   { color: var(--warn); background: rgba(255,176,32,0.12); }
.match-type-badge.type-squad { color: var(--lime); background: rgba(57,255,20,0.12); }

/* ═══════════ SOLO GRID (48 slots) ═══════════ */
.solo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 14px 18px 18px; }
.solo-slot {
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  cursor: pointer;
  transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
}
.solo-slot:active:not(:disabled) { transform: scale(0.94); }
.solo-slot-num { font-family: var(--font-display); font-size: 12px; font-weight: 700; color: var(--text-0); }
.solo-slot-label { font-size: 9px; font-weight: 700; letter-spacing: 0.03em; text-transform: uppercase; color: var(--cyan); }
.solo-slot.booked { border-color: rgba(57,255,20,0.3); background: rgba(57,255,20,0.06); cursor: not-allowed; }
.solo-slot.booked .solo-slot-num { color: var(--text-1); }
.solo-slot.booked .solo-slot-label { color: var(--lime); }

/* ═══════════ TEAM GRID (Duo/Squad — 12 team slots) ═══════════ */
.team-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 14px 18px 18px; }
.team-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 116px;
}
.team-card-label { font-family: var(--font-display); font-size: 12px; font-weight: 700; color: var(--text-1); letter-spacing: 0.02em; }
.book-team-btn {
  margin-top: auto;
  padding: 9px;
  border: 1px dashed rgba(0,255,255,0.35);
  border-radius: var(--radius-sm);
  background: rgba(0,255,255,0.05);
  color: var(--cyan);
  font-family: var(--font-body);
  font-size: 12.5px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s ease, filter 0.15s ease;
}
.book-team-btn:active { transform: scale(0.96); filter: brightness(1.2); }
.team-card.booked { border-color: rgba(57,255,20,0.3); background: rgba(57,255,20,0.04); }
.team-booked-tag { display: inline-flex; align-items: center; gap: 4px; font-size: 9.5px; font-weight: 800; color: var(--lime); background: rgba(57,255,20,0.12); border-radius: 999px; padding: 3px 8px; width: fit-content; }
.team-booked-name { font-size: 13.5px; font-weight: 700; color: var(--text-0); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.team-booked-roster { font-size: 11px; color: var(--text-2); font-weight: 600; margin-top: auto; }

/* ═══════════ BOOKING MODAL (bottom sheet) ═══════════ */
.booking-overlay {
  display: flex;
  position: fixed;
  inset: 0;
  z-index: 600;
  background: rgba(0,0,0,0.6);
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
}
.booking-overlay.show { opacity: 1; pointer-events: auto; }
.booking-sheet {
  width: 100%;
  max-width: 480px;
  max-height: 86vh;
  overflow-y: auto;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-top-left-radius: 20px;
  border-top-right-radius: 20px;
  padding: 10px 18px 22px;
  transform: translateY(100%);
  transition: transform 0.3s ease;
}
.booking-overlay.show .booking-sheet { transform: translateY(0); }
.booking-drag-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border); margin: 6px auto 14px; }
.booking-header { display: flex; align-items: flex-start; justify-content: space-between; }
.booking-title { font-family: var(--font-display); font-size: 14.5px; font-weight: 800; }
.booking-subtitle { font-size: 11.5px; color: var(--text-2); font-weight: 600; margin-top: 3px; }
.booking-close-btn { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg-1); color: var(--text-1); font-size: 13px; cursor: pointer; flex-shrink: 0; }
.booking-section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-2); margin: 18px 0 10px; }

.field { margin-bottom: 14px; }
.field-label { display: block; font-size: 11.5px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
.field-input { width: 100%; padding: 12px 14px; background: var(--bg-1); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-0); font-family: var(--font-body); font-size: 14.5px; font-weight: 600; outline: none; transition: border-color 0.15s ease, box-shadow 0.15s ease; }
.field-input::placeholder { color: var(--text-2); font-weight: 500; }
.field-input:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,255,255,0.1); }

.player-block { margin-bottom: 12px; }
.player-block-label { font-size: 11px; font-weight: 700; color: var(--text-1); margin-bottom: 6px; }
.player-inputs-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.fee-summary { display: flex; align-items: center; justify-content: space-between; background: var(--bg-1); border: 1px solid var(--border-soft); border-radius: var(--radius-sm); padding: 13px 14px; margin: 16px 0 14px; }
.fee-summary-label { font-size: 12.5px; color: var(--text-1); font-weight: 600; }
.fee-summary-value { font-family: var(--font-display); font-size: 16px; font-weight: 800; color: var(--lime); }

.confirm-pay-btn { width: 100%; padding: 14px; border: none; border-radius: var(--radius-sm); background: var(--grad); color: #08120a; font-family: var(--font-body); font-size: 14.5px; font-weight: 700; letter-spacing: 0.02em; cursor: pointer; transition: transform 0.15s ease, filter 0.15s ease; }
.confirm-pay-btn:active { transform: scale(0.98); filter: brightness(0.95); }

/* ═══════════ TOAST ═══════════ */
.toast-container { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 999; display: flex; flex-direction: column; gap: 8px; align-items: center; width: calc(100% - 32px); max-width: 480px; pointer-events: none; }
.toast { display: flex; align-items: center; gap: 8px; background: #1c1c1c; border: 1px solid var(--border); border-left: 3px solid var(--lime); border-radius: var(--radius-sm); padding: 12px 16px; font-size: 13px; font-weight: 600; color: var(--text-0); box-shadow: 0 8px 24px rgba(0,0,0,0.4); opacity: 0; transform: translateY(10px); transition: opacity 0.25s ease, transform 0.25s ease; }
.toast.show { opacity: 1; transform: translateY(0); }
.toast.error { border-left-color: var(--danger); }
</style>
</head>
<body>

<div class="wrapper">

  <!-- ═══════════ HEADER ═══════════ -->
  <div class="jm-header">
    <div class="jm-title-row">
      <div class="jm-left">
        <a href="index.html" class="jm-back-btn" aria-label="Back to Home">
            <svg class="ic" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </a>
        <div class="jm-title">Join <span>Match</span></div>
      </div>
      <div class="jm-slots-count" id="jmSlotsCount">— slots</div>
    </div>
    <div class="jm-match-title" id="jmMatchTitle">Loading…</div>
    <div class="jm-sub-row">
      <span class="match-type-badge type-squad" id="jmTypeBadge">Squad</span>
      <span class="jm-fee-text" id="jmFeeText">Entry: ₹0 / player</span>
    </div>
  </div>

  <!-- Slot grids — only one shows at a time based on match type -->
  <div id="soloGrid" class="solo-grid" style="display:none;"></div>
  <div id="teamGrid" class="team-grid" style="display:none;"></div>

</div>

<!-- ═══════════ BOOKING MODAL ═══════════ -->
<div class="booking-overlay" id="bookingOverlay">
  <div class="booking-sheet">
    <div class="booking-drag-handle"></div>
    <div class="booking-header">
      <div>
        <div class="booking-title" id="bookingTitle">Book Team Slot</div>
        <div class="booking-subtitle" id="bookingSubtitle">Team 1 · Squad · 4 players</div>
      </div>
      <button class="booking-close-btn" onclick="closeBookingModal()" aria-label="Close">✕</button>
    </div>
    <div class="booking-section-label">Team Details</div>
    <div class="field">
      <label class="field-label" for="teamNameInput">Team Name</label>
      <input type="text" id="teamNameInput" class="field-input" placeholder="e.g. Alpha Wolves">
    </div>
    <div class="booking-section-label">Player Details</div>
    <div id="playerFieldsContainer"></div>
    <div class="fee-summary">
      <span class="fee-summary-label">Total Entry Fee</span>
      <span class="fee-summary-value" id="feeSummaryValue">₹0</span>
    </div>
    <button class="confirm-pay-btn" id="confirmPayBtn" onclick="confirmBooking()">Confirm & Pay</button>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
/* ═══════════════════════════════════════════
   PLAYTA — JOIN MATCH
   Connected to localStorage (written by admin.html):
     upcoming_matches  → all matches
     selectedMatchId   → which match the user tapped
   ═══════════════════════════════════════════ */

const TEAM_SIZE       = { Solo: 1, Duo: 2, Squad: 4 };
const TEAM_SLOT_COUNT = { Duo: 24, Squad: 12 };  // total team slots per match type

// Will be set from localStorage on init
let currentMatchType  = 'Squad';
let entryFeePerPlayer = 0;

// In-memory slot state.
// NOTE: For a live multi-player app these must live in Firestore
// so all users see the same state. localStorage is per-device.
let soloSlots = Array.from({ length: 48 }, (_, i) => ({
  slotNumber: i + 1,
  status: 'open'   // 'open' | 'joined'
}));

let teamSlots = Array.from({ length: 12 }, (_, i) => ({
  teamNumber: i + 1,
  status: 'open',  // 'open' | 'booked'
  teamName: null,
  roster: []
}));

let activeTeamNumber = null;

/* ─── Toast ───────────────────────────────── */
function showToast(message, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast' + (type === 'error' ? ' error' : '');
  toast.textContent = message;
  container.appendChild(toast);
  requestAnimationFrame(() => {
    requestAnimationFrame(() => toast.classList.add('show'));
  });
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 300);
  }, 2400);
}

/* ─── Formatting ──────────────────────────── */
function fmtUnits(n) { return (Number(n) || 0).toLocaleString('en-IN'); }
function escHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

/* ─── Master render ───────────────────────── */
function renderAll() {
  // Update header badge & fee text
  const badge = document.getElementById('jmTypeBadge');
  badge.className = 'match-type-badge type-' + currentMatchType.toLowerCase();
  badge.textContent = currentMatchType;
  document.getElementById('jmFeeText').textContent =
    'Entry: ₹' + fmtUnits(entryFeePerPlayer) + ' / player';

  const soloGrid = document.getElementById('soloGrid');
  const teamGrid = document.getElementById('teamGrid');

  if (currentMatchType === 'Solo') {
    soloGrid.style.display = 'grid';
    teamGrid.style.display = 'none';
    renderSoloGrid();
  } else {
    soloGrid.style.display = 'none';
    teamGrid.style.display = 'grid';
    renderTeamGrid();
  }
}

/* ─── SOLO grid ───────────────────────────── */
function renderSoloGrid() {
  const joined = soloSlots.filter(s => s.status === 'joined').length;
  document.getElementById('jmSlotsCount').textContent = joined + ' / 48 joined';

  document.getElementById('soloGrid').innerHTML = soloSlots.map(slot => `
    <button class="solo-slot ${slot.status === 'joined' ? 'booked' : ''}"
            ${slot.status === 'joined' ? 'disabled' : ''}
            onclick="joinSoloSlot(${slot.slotNumber})">
      <div class="solo-slot-num">#${slot.slotNumber}</div>
      <div class="solo-slot-label">${slot.status === 'joined' ? 'Joined ✓' : 'Join'}</div>
    </button>
  `).join('');
}

function joinSoloSlot(slotNumber) {
  const slot = soloSlots.find(s => s.slotNumber === slotNumber);
  if (!slot || slot.status === 'joined') return;
  // TODO: replace with Firestore transaction before going live
  slot.status = 'joined';
  showToast('Slot #' + slotNumber + ' joined!');
  renderSoloGrid();
}

/* ─── DUO / SQUAD team grid ───────────────── */
function renderTeamGrid() {
  const size   = TEAM_SIZE[currentMatchType];
  const total  = teamSlots.length;
  const booked = teamSlots.filter(t => t.status === 'booked').length;
  document.getElementById('jmSlotsCount').textContent = booked + ' / ' + total + ' teams';

  document.getElementById('teamGrid').innerHTML = teamSlots.map(team => {
    if (team.status === 'booked') {
      return `
        <div class="team-card booked">
          <div class="team-card-label">TEAM ${team.teamNumber}</div>
          <div class="team-booked-tag">✓ Booked</div>
          <div class="team-booked-name">${escHtml(team.teamName)}</div>
          <div class="team-booked-roster">${team.roster.length}/${size} players</div>
        </div>`;
    }
    return `
      <div class="team-card">
        <div class="team-card-label">TEAM ${team.teamNumber}</div>
        <button class="book-team-btn" onclick="openBookingModal(${team.teamNumber})">Book Team Slot</button>
      </div>`;
  }).join('');
}

/* ─── Booking modal ───────────────────────── */
function openBookingModal(teamNumber) {
  activeTeamNumber = teamNumber;
  const size  = TEAM_SIZE[currentMatchType];
  const total = entryFeePerPlayer * size;

  document.getElementById('bookingSubtitle').textContent =
    'Team ' + teamNumber + ' · ' + currentMatchType + ' · ' + size + ' players';
  document.getElementById('teamNameInput').value = '';

  document.getElementById('playerFieldsContainer').innerHTML =
    Array.from({ length: size }, (_, i) => `
      <div class="player-block">
        <div class="player-block-label">Player ${i + 1}</div>
        <div class="player-inputs-row">
          <input type="text" id="playerIgn_${i}" class="field-input" placeholder="IGN">
          <input type="text" id="playerUid_${i}" class="field-input" placeholder="UID">
        </div>
      </div>`).join('');

  document.getElementById('feeSummaryValue').textContent = '₹' + fmtUnits(total);
  document.getElementById('confirmPayBtn').textContent   = 'Confirm & Pay · ₹' + fmtUnits(total);
  document.getElementById('bookingOverlay').classList.add('show');
}

function closeBookingModal() {
  document.getElementById('bookingOverlay').classList.remove('show');
  activeTeamNumber = null;
}

document.getElementById('bookingOverlay').addEventListener('click', (e) => {
  if (e.target.id === 'bookingOverlay') closeBookingModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeBookingModal();
});

function confirmBooking() {
  if (activeTeamNumber === null) return;
  const size     = TEAM_SIZE[currentMatchType];
  const teamName = document.getElementById('teamNameInput').value.trim();

  if (!teamName) { showToast('Please enter a team name', 'error'); return; }

  const roster = [];
  for (let i = 0; i < size; i++) {
    const ign = document.getElementById('playerIgn_' + i).value.trim();
    const uid = document.getElementById('playerUid_' + i).value.trim();
    if (!ign || !uid) {
      showToast('Please fill in every player\u2019s IGN & UID', 'error');
      return;
    }
    roster.push({ ign, uid });
  }

  // TODO: open Razorpay checkout here.
  // Only mark the slot booked INSIDE Razorpay's success callback.
  const team = teamSlots.find(t => t.teamNumber === activeTeamNumber);
  team.status   = 'booked';
  team.teamName = teamName;
  team.roster   = roster;

  showToast('Team ' + activeTeamNumber + ' booked!');
  closeBookingModal();
  renderTeamGrid();
}

/* ═══════════════════════════════════════════
   INIT — reads from localStorage, sets match
   context, then renders the correct slot UI.
   ═══════════════════════════════════════════ */
(function initJoinPage() {
  let activeMatch = null;

  try {
    const selectedId = localStorage.getItem('selectedMatchId');
    const allMatches = JSON.parse(localStorage.getItem('upcoming_matches')) || [];
    activeMatch = allMatches.find(m => m.id === selectedId) || null;
  } catch (e) {
    console.error('[Playta] Failed to load match data from localStorage:', e);
  }

  // ── Match not found (user came directly, or match was deleted) ──
  if (!activeMatch) {
    document.body.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;
                  min-height:100vh;padding:40px;text-align:center;
                  background:#0f0f0f;font-family:'Rajdhani',sans-serif;">
        <div style="font-size:44px;margin-bottom:14px;">🎮</div>
        <div style="font-size:16px;font-weight:700;color:#f5f5f5;margin-bottom:8px;">Match Not Found</div>
        <div style="font-size:13px;color:#6e6e6e;margin-bottom:28px;">
          Please go back and tap a tournament card.
        </div>
        <a href="index.html"
           style="padding:12px 28px;background:linear-gradient(135deg,#39ff14,#00ffff);
                  color:#08120a;border-radius:10px;font-weight:700;font-size:14px;
                  text-decoration:none;">← Back to Home</a>
      </div>`;
    return;
  }

  // ── Valid match found — set context ──
  currentMatchType  = activeMatch.matchType || 'Squad';
  entryFeePerPlayer = Number(activeMatch.entryFee) || 0;

  // Re-build teamSlots with the correct count for this match type
  // Duo → 24 team slots (24×2 = 48 players)
  // Squad → 12 team slots (12×4 = 48 players)
  const slotCount = TEAM_SLOT_COUNT[currentMatchType] || 12;
  teamSlots = Array.from({ length: slotCount }, (_, i) => ({
    teamNumber: i + 1,
    status: 'open',
    teamName: null,
    roster: []
  }));

  // Update header with real match data
  document.getElementById('jmMatchTitle').textContent = activeMatch.title;
  document.getElementById('jmTypeBadge').className    = 'match-type-badge type-' + currentMatchType.toLowerCase();
  document.getElementById('jmTypeBadge').textContent  = currentMatchType;
  document.getElementById('jmFeeText').textContent    = 'Entry: ₹' + fmtUnits(entryFeePerPlayer) + ' / player';

  // Render the correct slot layout (Solo grid or Team grid)
  renderAll();
})();
</script>

</body>
</html>
